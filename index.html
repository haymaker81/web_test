    <style>
        /* 모달 배경 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        /* 캔버스 컨테이너 스타일 */

            background-color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
        }

        /* 닫기 버튼을 모달 상단 우측에 배치 */
        #modal-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
        }
    </style>
