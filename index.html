<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 정보 검색 및 선택1</title>
    <!-- Tailwind CSS CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모달 배경 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        /* 캔버스 컨테이너 스타일 */
        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
        }

        /* 캔버스 스타일 (이전 파일에서 가져옴) */
        canvas {
            border: 1px solid #e5e7eb;
            display: block;
            width: 100%;
            height: auto;
        }

        /* 닫기 버튼을 모달 상단 우측에 배치 */
        #modal-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
        }
    </style>
    <script>
        // 캔버스에 그릴 데이터 정의
        const customerData = [
            { id: 1001, name: "김민준", email: "minjun@example.com", phone: "010-1234-5678" },
            { id: 1002, name: "이서연", email: "seoyeon@example.com", phone: "010-9876-5432" },
            { id: 1003, name: "박지훈", email: "jihun@example.com", phone: "010-1111-2222" },
            { id: 1004, name: "최유진", email: "yujin@example.com", phone: "010-3333-4444" },
            { id: 1005, name: "정하윤", email: "hayun@example.com", phone: "010-5555-6666" },
            { id: 1006, name: "홍길동", email: "gildong@example.com", phone: "010-4321-8765" },
            { id: 1007, name: "성춘향", email: "chunhyang@example.com", phone: "010-1010-3030" },
        ];

        // 테이블 헤더 정의
        const headers = ["ID", "이름", "이메일", "전화번호"];
        const columnWidths = [100, 120, 250, 150]; // 각 열의 너비 (픽셀)
        const rowHeight = 40; // 행의 높이 (픽셀)
        const padding = 10; // 셀 내부 패딩
        const totalCanvasWidth = columnWidths.reduce((sum, width) => sum + width, 0);

        /**
         * 캔버스 위에 고객 정보 테이블을 그리는 함수
         */
        function drawCustomerTable(canvas, data, headers, widths) {
            const ctx = canvas.getContext('2d');
            const totalWidth = totalCanvasWidth;
            const totalHeight = (data.length + 1) * rowHeight; // 헤더 포함 총 높이

            // 캔버스 크기 설정 (화면 배율 고려)
            const dpr = window.devicePixelRatio || 1;
            canvas.width = totalWidth * dpr;
            canvas.height = totalHeight * dpr;
            ctx.scale(dpr, dpr); // 캔버스 좌표 시스템 조정

            ctx.clearRect(0, 0, totalWidth, totalHeight); // 캔버스 초기화

            // 스타일 설정
            ctx.font = '14px Noto Sans KR, sans-serif';
            ctx.textAlign = 'left';
            ctx.strokeStyle = '#d1d5db'; // 그리드 선 색상
            ctx.lineWidth = 1;

            let currentY = 0;

            // 1. 헤더 행 그리기
            ctx.fillStyle = '#f3f4f6';
            ctx.fillRect(0, currentY, totalWidth, rowHeight);

            let currentX = 0;
            ctx.fillStyle = '#1f2937';
            for (let i = 0; i < headers.length; i++) {
                ctx.fillText(headers[i], currentX + padding, currentY + rowHeight / 2 + 5);
                if (i < headers.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(currentX + widths[i], currentY);
                    ctx.lineTo(currentX + widths[i], currentY + rowHeight);
                    ctx.stroke();
                }
                currentX += widths[i];
            }

            // 수평선 그리기 (헤더 아래)
            ctx.beginPath();
            ctx.moveTo(0, currentY + rowHeight);
            ctx.lineTo(totalWidth, currentY + rowHeight);
            ctx.stroke();
            currentY += rowHeight;

            // 2. 데이터 행 그리기
            data.forEach((row, rowIndex) => {
                currentX = 0;
                ctx.fillStyle = (rowIndex % 2 === 0) ? '#ffffff' : '#f9fafb';
                ctx.fillRect(0, currentY, totalWidth, rowHeight);

                ctx.fillStyle = '#374151';
                const rowValues = [row.id, row.name, row.email, row.phone];

                for (let i = 0; i < rowValues.length; i++) {
                    ctx.fillText(rowValues[i], currentX + padding, currentY + rowHeight / 2 + 5);

                    if (i < rowValues.length - 1) {
                        ctx.beginPath();
                        ctx.moveTo(currentX + widths[i], currentY);
                        ctx.lineTo(currentX + widths[i], currentY + rowHeight);
                        ctx.stroke();
                    }
                    currentX += widths[i];
                }

                // 수평선 그리기 (행 아래)
                ctx.beginPath();
                ctx.moveTo(0, currentY + rowHeight);
                ctx.lineTo(totalWidth, currentY + rowHeight);
                ctx.stroke();
                currentY += rowHeight;
            });

            // 3. 전체 테이블 윤곽선 (좌, 우)
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, totalHeight);
            ctx.moveTo(totalWidth, 0);
            ctx.lineTo(totalWidth, totalHeight);
            ctx.stroke();
        }

        /** 모달을 표시하는 함수 */
        function showModal() {
            const modal = document.getElementById('searchModal');
            modal.classList.remove('hidden');
            // 모달을 표시한 후 캔버스를 다시 그려 줍니다.
            const canvas = document.getElementById('customerTable');
            drawCustomerTable(canvas, customerData, headers, columnWidths);
        }

        /** 모달을 숨기는 함수 */
        function hideModal() {
            const modal = document.getElementById('searchModal');
            modal.classList.add('hidden');
        }

        /** 선택된 고객 정보를 메인 화면에 업데이트하는 함수 */
        function updateSelectedCustomer(customer) {
            const resultBody = document.getElementById('resultBody');
            resultBody.innerHTML = `
                <tr class="bg-indigo-50 border-indigo-200 border-b">
                    <td class="px-6 py-3 font-medium text-indigo-800">${customer.id}</td>
                    <td class="px-6 py-3">${customer.name}</td>
                    <td class="px-6 py-3">${customer.email}</td>
                    <td class="px-6 py-3">${customer.phone}</td>
                </tr>
            `;
        }

        /** 캔버스 더블 클릭 이벤트 핸들러 */
        function handleCanvasDoubleClick(event) {
            // event.offsetY는 캔버스 엘리먼트 내에서의 Y 좌표 (CSS 픽셀 기준)
            const y = event.offsetY;
            
            // 클릭된 행의 인덱스 계산 (0부터 시작)
            // Header는 row 0, Data는 row 1부터 시작
            const clickedRowIndex = Math.floor(y / rowHeight);

            if (clickedRowIndex === 0) {
                // 헤더를 클릭한 경우, 아무 작업도 하지 않습니다.
                return;
            }

            // 데이터 배열의 인덱스는 (클릭된 행 인덱스 - 1)
            const dataIndex = clickedRowIndex - 1;

            if (dataIndex >= 0 && dataIndex < customerData.length) {
                const selectedCustomer = customerData[dataIndex];
                updateSelectedCustomer(selectedCustomer);
                hideModal(); // 선택 후 모달 닫기
            }
        }

        window.onload = function() {
            const searchBtn = document.getElementById('searchBtn');
            searchBtn.addEventListener('click', showModal);

            const canvas = document.getElementById('customerTable');
            // 캔버스에 더블 클릭 이벤트 리스너 추가
            canvas.addEventListener('dblclick', handleCanvasDoubleClick);

            // 초기 결과 테이블을 빈 값으로 설정합니다.
            updateSelectedCustomer({
                id: '-', name: '검색된 고객 없음', email: '-', phone: '-'
            });
        };
    </script>
</head>
<body class="bg-gray-50 p-8 min-h-screen font-sans">
    <div class="max-w-3xl mx-auto bg-white shadow-2xl rounded-xl p-8">
        <h1 class="text-3xl font-extrabold mb-8 text-indigo-700">고객 정보 검색 애플리케이션</h1>
        
        <!-- 1. 검색 버튼 영역 -->
        <div class="mb-8 flex justify-center">
            <button id="searchBtn" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition ease-in-out duration-150">
                고객 검색하기 (모달 열기)
            </button>
        </div>

        <!-- 2. 검색 결과 테이블 영역 (선택된 한 행) -->
        <h2 class="text-xl font-bold mb-4 text-gray-700">선택된 고객 정보</h2>
        <div class="overflow-x-auto rounded-lg border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">이름</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">이메일</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">전화번호</th>
                    </tr>
                </thead>
                <tbody id="resultBody" class="bg-white divide-y divide-gray-200">
                    <!-- 선택된 고객 정보가 여기에 삽입됩니다. -->
                </tbody>
            </table>
        </div>
        
    </div>

    <!-- 4. Canvas 모달 레이어 (div) -->
    <div id="searchModal" class="modal-overlay hidden" onclick="if(event.target === this) hideModal()">
        <div class="modal-content">
            <h3 class="text-2xl font-semibold mb-4 text-gray-700">고객 검색 (더블클릭하여 선택)</h3>
            
            <!-- 닫기 버튼 -->
            <button id="modal-close-btn" onclick="hideModal()" class="p-1 text-gray-400 hover:text-gray-600 rounded-full bg-white transition duration-150 ease-in-out">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <!-- 캔버스 엘리먼트 -->
            <canvas id="customerTable" role="img" aria-label="고객 정보 목록 테이블"></canvas>
            
            <p class="mt-4 text-sm text-gray-600">
                * 원하는 고객 정보를 **더블클릭**하여 선택해 주세요.
            </p>
        </div>
    </div>
</body>
</html>
